services:
  - type: worker
    name: sh-cv-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python tools/telegram_bot.py
    plan: free
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GOOGLE_AI_API_KEY
        sync: false
      - key: GMAIL_SENDER
        sync: false
      - key: GOOGLE_OAUTH_TOKEN_B64
        sync: false
